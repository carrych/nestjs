name: Build & Deploy Stage

on:
  push:
    branches: [develop]

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.image }}
      tag: sha-${{ github.sha }}
      digest: ${{ steps.push.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        run: echo "image=ghcr.io/${{ github.repository_owner }}/nestjs-ecommerce" >> "$GITHUB_OUTPUT"

      - id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: prod-distroless
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:sha-${{ github.sha }}
            ${{ steps.meta.outputs.image }}:stage-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create release manifest
        run: |
          jq -n \
            --arg commit "${{ github.sha }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg buildTime "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg image "${{ steps.meta.outputs.image }}:sha-${{ github.sha }}" \
            --arg digest "${{ steps.push.outputs.digest }}" \
            '{
              commit: $commit,
              branch: $branch,
              buildTime: $buildTime,
              services: {
                "nestjs-ecommerce": {
                  image: $image,
                  digest: $digest
                }
              }
            }' > release-manifest.json
          cat release-manifest.json

      - uses: actions/upload-artifact@v4
        with:
          name: release-manifest-${{ github.sha }}
          path: release-manifest.json
          retention-days: 90

  deploy-stage:
    name: Deploy to Stage
    needs: build
    runs-on: [self-hosted, stage]

    environment:
      name: stage
      url: http://localhost:8081/health

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: release-manifest-${{ github.sha }}

      - run: |
          echo "Commit: ${{ github.sha }}"
          echo "Image:  ${{ needs.build.outputs.image }}:${{ needs.build.outputs.tag }}"
          cat release-manifest.json

      - run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Deploy
        env:
          DEPLOY_IMAGE: ${{ needs.build.outputs.image }}:${{ needs.build.outputs.tag }}
          COMPOSE_PROJECT_NAME: nestjs-stage
          API_PORT: "8081"
          DB_NAME: ${{ secrets.STAGE_DB_NAME }}
          DB_USER: ${{ secrets.STAGE_DB_USER }}
          DB_PASSWORD: ${{ secrets.STAGE_DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.STAGE_JWT_SECRET }}
          JWT_EXPIRES_IN: "1d"
          AWS_ACCESS_KEY_ID: ${{ secrets.STAGE_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.STAGE_AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.STAGE_AWS_REGION }}
          AWS_S3_BUCKET: ${{ secrets.STAGE_AWS_S3_BUCKET }}
          NP_API_KEY: ${{ secrets.STAGE_NP_API_KEY }}
          UKRPOSHTA_TOKEN: ${{ secrets.STAGE_UKRPOSHTA_TOKEN }}
          RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
        run: ./scripts/deploy.sh stage

      - name: Smoke test
        run: |
          curl --fail --retry 6 --retry-delay 5 --retry-connrefused \
            http://localhost:8081/health
