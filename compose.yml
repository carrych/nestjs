name: nestjs-ecommerce

# ─────────────────────────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────────────────────────
# backend — internal network; PostgreSQL is NEVER exposed to the internet.
#           All services that need the DB attach to this network.
# public  — default bridge network; only api attaches here so it can
#           reach external APIs (Nova Poshta, UkrPoshta, AWS S3).
#           The `ports` mapping on api brings traffic from the host
#           through Docker's NAT — internal: true would block that external reach.

networks:
  backend:
    internal: true
  public: {}

# ─────────────────────────────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────────────────────────────
volumes:
  pgdata:
  rabbitmq_data:

# ─────────────────────────────────────────────────────────────────
# Services
# ─────────────────────────────────────────────────────────────────
services:

  # ── RabbitMQ ─────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - backend
      - public           # needed for host port mapping (internal: true blocks it on backend)
    ports:
      - "5672:5672"     # AMQP — for local dev (yarn start:dev outside Docker)
      - "15672:15672"   # Management UI — available on host for development
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── PostgreSQL ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    command: postgres -c shared_preload_libraries=pg_stat_statements
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend           # internal only — no ports: block = not reachable from host
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── API (prod-distroless) ────────────────────────────────────────
  api:
    build:
      context: .
      target: prod-distroless
    env_file: .env
    environment:
      NODE_ENV: production
      GRAPHQL_SCHEMA_PATH: /tmp/schema.gql
      # Override DB_HOST: in Docker, postgres is the service name, not "localhost"
      DB_HOST: postgres
      PAYMENTS_GRPC_URL: "payments-grpc:50051"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672"
      THROTTLE_GLOBAL_LIMIT: "100000"
      THROTTLE_STRICT_LIMIT: "100000"
    ports:
      - "8082:3000"     # host:container — 8080/8081 used by prod/stage CD deployments
    networks:
      - backend          # reaches postgres
      - public           # reaches internet (Nova Poshta, UkrPoshta, S3)
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      payments-grpc:
        condition: service_started
    # distroless has no shell/curl/wget — use node's built-in http module.
    # /nodejs/bin/node is the absolute path to node in the distroless image.
    healthcheck:
      test:
        - CMD
        - /nodejs/bin/node
        - -e
        - "require('http').get('http://localhost:3000/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    init: true           # PID 1 signal handling; forwards SIGTERM correctly
    stop_grace_period: 30s

  # ── Migrations (one-off job) ─────────────────────────────────────
  # Run manually: docker compose run --rm migrate
  # Uses `prod` (alpine) stage — needs node to run TypeORM CLI
  migrate:
    build:
      context: .
      target: prod
    command:
      - node
      - node_modules/typeorm/cli.js
      - migration:run
      - -d
      - dist/data-source.js
    env_file: .env
    environment:
      NODE_ENV: production
      DB_HOST: postgres
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    profiles:
      - tools

  # ── Payments gRPC ────────────────────────────────────────────────
  # Separate scalable container for payment processing (Authorize/Capture/Refund).
  # Scale independently: docker compose up --scale payments-grpc=3
  payments-grpc:
    build:
      context: .
      target: payments-grpc
    env_file: .env
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      PAYMENTS_GRPC_PORT: "50051"
      PAYMENTS_GRPC_URL: "payments-grpc:50051"
    networks:
      - backend           # internal only — gRPC is service-to-service, not public
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Invoice Service ──────────────────────────────────────────────
  invoice-service:
    build:
      context: ../invoice-service
      target: prod
    env_file: .env
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      PORT: "3001"
      PUBLIC_INVOICE_URL: http://invoice-service:3001
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-eu-central-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
    ports:
      - "3001:3001"     # exposed for PDF/QR access from host
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # ── WS Service ───────────────────────────────────────────────────
  ws-service:
    build:
      context: ../ws-service
      target: prod
    env_file: .env
    environment:
      NODE_ENV: production
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      PORT: "3002"
    ports:
      - "3002:3002"     # Socket.IO port exposed to clients
    networks:
      - backend
      - public           # clients connect from outside
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # ── Seed (one-off job) ───────────────────────────────────────────
  # Run manually: docker compose run --rm seed
  # ALLOW_SEED=true bypasses the production guard in seed.ts
  seed:
    build:
      context: .
      target: prod
    command:
      - node
      - dist/src/seed/seed.js
    env_file: .env
    environment:
      NODE_ENV: production
      ALLOW_SEED: "true"
      DB_HOST: postgres
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    profiles:
      - tools
